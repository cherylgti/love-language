<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Language Test – bakat.id</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --lav: #C8405A;
  --lav-light: #F2A0B0;
  --lav-pale: #FDF0F2;
  --lav-deep: #7D1A2E;
  --cream: #FBF8F4;
  --warm-white: #FEFCFA;
  --blush: #F7D6DC;
  --ink: #1C1016;
  --ink-mid: #4A2D35;
  --ink-muted: #8C6870;
  --gold: #C4923A;
  --gold-light: #F0D5A0;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--warm-white); color: var(--ink);
  height: 100vh; height: 100dvh; overflow: hidden;
}

.bg {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse at 50% 20%, rgba(200,64,90,0.06) 0%, transparent 65%);
  pointer-events: none;
}

.app {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  min-height: 100vh; height: 100dvh;
  max-width: 430px; margin: 0 auto; width: 100%;
}

/* ── HEADER ─────────────────────────────── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 10px; flex-shrink: 0;
}
.logo { font-size: 16px; font-weight: 700; letter-spacing: 0.02em; color: var(--ink); }
.q-counter { font-size: 11px; font-weight: 500; color: var(--ink-muted); letter-spacing: 0.04em; }

.back-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(200,64,90,0.07);
  border: 1px solid rgba(200,64,90,0.18);
  color: var(--ink-mid); font-size: 20px; line-height: 1;
  align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  transition: background 0.18s, transform 0.15s;
  display: none;
}
.back-btn:active { transform: scale(0.91); background: rgba(200,64,90,0.14); }

/* ── SUBTEST BADGE ───────────────────────── */
.subtest-badge {
  display: flex; align-items: center; justify-content: center;
  padding: 0 20px 4px; flex-shrink: 0;
}
.badge-pill {
  background: rgba(200,64,90,0.08);
  border: 1px solid rgba(200,64,90,0.20);
  border-radius: 50px; padding: 4px 14px;
  font-size: 10.5px; font-weight: 500;
  letter-spacing: 0.10em; text-transform: uppercase;
  color: var(--lav);
}

/* ── PROGRESS BAR ───────────────────────── */
.progress-wrap { padding: 0 20px 2px; flex-shrink: 0; }
.progress-track { height: 3px; border-radius: 3px; background: rgba(200,64,90,0.10); overflow: hidden; }
.progress-fill {
  height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, var(--lav-light), var(--lav));
  transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ── QUESTION ───────────────────────────── */
.question-wrap { flex-shrink: 0; padding: 14px 24px 8px; }
.q-eyebrow {
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--lav); margin-bottom: 5px;
}
.q-text {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: clamp(16px, 4.8vw, 20px);
  font-weight: 700; letter-spacing: -0.01em; line-height: 1.25;
  color: var(--ink);
  transition: opacity 0.22s ease;
}

/* ── RANK LIST ──────────────────────────── */
.cards-stage {
  flex: 1 1 auto; min-height: 120px;
  display: flex; flex-direction: column;
  gap: 8px; padding: 20px 18px 4px;
  overflow-y: auto;
  align-items: stretch;
}

.rank-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px;
  border-radius: 16px;
  background: rgba(200,64,90,0.04);
  border: 1.5px solid rgba(200,64,90,0.12);
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.18s ease;
}
.rank-row:active { transform: scale(0.97); }
.rank-row.rank-done {
  border-color: rgba(200,64,90,0.48);
  box-shadow: 0 0 20px rgba(200,64,90,0.12);
}
.rank-row-badge {
  width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
  background: rgba(200,64,90,0.07);
  border: 1.5px solid rgba(200,64,90,0.20);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: var(--ink-mid);
  transition: background 0.25s, border-color 0.25s,
              transform 0.35s cubic-bezier(0.34,1.6,0.64,1);
}
.rank-row-badge:empty::after {
  content: '';
  display: block;
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(200,64,90,0.25);
}
.rank-row.rank-done .rank-row-badge {
  background: var(--lav);
  border-color: transparent;
  color: #fff;
  transform: scale(1.08);
}
.rank-row-label {
  font-size: 13.5px; font-weight: 400; line-height: 1.35;
  color: var(--ink-mid);
}

/* ── BOTTOM ─────────────────────────────── */
.bottom {
  flex-shrink: 0;
  padding: 8px 22px calc(22px + env(safe-area-inset-bottom));
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.hint-text {
  font-size: 12px; font-weight: 400;
  color: var(--ink-muted); opacity: 0.7; text-align: center; min-height: 18px;
  transition: opacity 0.2s;
}
.hint-text.active { opacity: 1; color: var(--ink-mid); }

.next-btn {
  display: none;
  align-items: center;
  background: var(--lav);
  border: none; border-radius: 100px; padding: 6px;
  box-shadow: 0 4px 20px rgba(200,64,90,0.32);
  cursor: pointer;
  font-family: 'DM Sans', system-ui, sans-serif; font-weight: 500;
  width: 100%;
  transition: transform 0.18s, background 0.18s, box-shadow 0.18s;
  animation: slideUp 0.4s cubic-bezier(0.22,1,0.36,1);
}
.next-btn.visible { display: flex; }
.next-btn:hover { background: var(--lav-deep); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(200,64,90,0.40); }
.next-btn:active { transform: scale(0.97); }
.next-label { color: #fff; flex: 1; text-align: center; margin: 0 4px 0 18px; font-size: 15px; font-weight: 500; }
.next-icon  {
  background: rgba(255,255,255,0.18);
  border-radius: 100px; padding: 12px 22px;
  color: #fff; font-size: 18px; line-height: 1;
  flex-shrink: 0;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── CHOICE CARDS (Q1–10) ───────────────── */
.choice-card {
  display: flex; align-items: center; gap: 13px;
  padding: 12px 14px 10px 12px;
  border-radius: 18px;
  background: linear-gradient(145deg, #FDF5F0 0%, #F2E4DA 100%);
  border: 1.5px solid rgba(200,64,90,0.13);
  box-shadow: 0 6px 22px rgba(200,64,90,0.11), 0 1px 4px rgba(0,0,0,0.05),
              rgba(255,248,245,0.6) 1px 1px 2px inset;
  cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent;
  transition: border-color 0.28s ease, box-shadow 0.38s ease,
              opacity 0.28s ease, background 0.28s ease,
              transform 0.42s cubic-bezier(0.34,1.56,0.64,1);
}
.choice-card:active { transform: rotate(var(--card-tilt,0deg)) scale(0.96) !important; }

/* per-card tilt + float */
#cardsStage .choice-card:nth-child(1) {
  --card-tilt: -1.5deg;
  animation: card-float 3.3s ease-in-out infinite;
  animation-delay: 0s;
}
#cardsStage .choice-card:nth-child(2) {
  --card-tilt: 0.9deg;
  animation: card-float 3.7s ease-in-out infinite;
  animation-delay: -1.15s;
}
#cardsStage .choice-card:nth-child(3) {
  --card-tilt: -1.1deg;
  animation: card-float 3.5s ease-in-out infinite;
  animation-delay: -0.65s;
}

@keyframes card-float {
  0%,100% { transform: rotate(var(--card-tilt,0deg)) translateY(0px);   }
  50%      { transform: rotate(var(--card-tilt,0deg)) translateY(-6px);  }
}

.choice-card.state-best {
  animation: none;
  transform: rotate(0deg) translateY(-8px) scale(1.02);
  border-color: var(--lav);
  box-shadow: 0 12px 36px rgba(200,64,90,0.22), 0 3px 10px rgba(200,64,90,0.12),
              rgba(255,248,245,0.6) 1px 1px 2px inset;
  background: linear-gradient(145deg, #FEF0F2 0%, #F7D6DC 100%);
}
.choice-card.state-worst {
  animation: none;
  transform: rotate(0deg) translateY(-4px) scale(1.01);
  border-color: var(--lav-deep);
  box-shadow: 0 8px 26px rgba(125,26,46,0.18), 0 2px 8px rgba(125,26,46,0.10),
              rgba(255,248,245,0.4) 1px 1px 2px inset;
  background: linear-gradient(145deg, #F5E8E2 0%, #E8D0C8 100%);
}
.choice-card.state-neutral { opacity: 0.52; }

.cc-emoji-wrap {
  width: 48px; height: 48px; flex-shrink: 0;
  border-radius: 13px;
  background: rgba(200,64,90,0.08);
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; line-height: 1;
  transition: background 0.28s, transform 0.35s cubic-bezier(0.34,1.6,0.64,1);
}
.choice-card.state-best .cc-emoji-wrap {
  background: rgba(200,64,90,0.16);
  transform: scale(1.06);
}
.choice-card.state-worst .cc-emoji-wrap {
  background: rgba(125,26,46,0.14);
  transform: scale(1.04);
}

.cc-body { flex: 1; min-width: 0; }
.cc-text {
  font-size: 13.5px; font-weight: 400; line-height: 1.45;
  color: var(--ink-mid);
}
.cc-pill {
  display: inline-block; margin-top: 5px; min-height: 18px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase;
  padding: 2px 9px; border-radius: 50px; opacity: 0;
  transition: opacity 0.28s ease;
}
.choice-card.state-best .cc-pill {
  opacity: 1;
  background: rgba(200,64,90,0.12); color: var(--lav);
}
.choice-card.state-worst .cc-pill {
  opacity: 1;
  background: rgba(125,26,46,0.12); color: var(--lav-deep);
}

.cc-check {
  width: 28px; height: 28px; flex-shrink: 0;
  border-radius: 50%;
  background: rgba(200,64,90,0.06);
  border: 1.5px solid rgba(200,64,90,0.20);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: transparent;
  transition: background 0.28s, border-color 0.28s, color 0.22s,
              transform 0.35s cubic-bezier(0.34,1.6,0.64,1);
  position: relative;
}
.cc-check::before {
  content: '';
  position: absolute; inset: 0; border-radius: 50%;
  background: rgba(200,64,90,0.18);
  animation: pulse-idle 2.2s ease-in-out infinite;
}
.choice-card.state-best .cc-check {
  background: var(--lav); border-color: transparent;
  color: #fff; transform: scale(1.15);
}
.choice-card.state-worst .cc-check {
  background: var(--lav-deep); border-color: transparent;
  color: #fff; transform: scale(1.05);
}
.choice-card.state-best .cc-check::before,
.choice-card.state-worst .cc-check::before,
.choice-card.state-neutral .cc-check::before { display: none; }

@keyframes pulse-idle {
  0%,100% { opacity:0.35; transform:scale(0.5); }
  50%      { opacity:0;    transform:scale(1.2); }
}

/* ── GRADIENT BG PER QUESTION ──────────── */
.bg-scene {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  transition: opacity 0.7s ease;
}
</style>
</head>
<body>
<div class="bg-scene" id="bgScene"></div>
<div class="bg"></div>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <button class="back-btn" id="backBtn" onclick="doBack()">←</button>
    <div class="logo" id="headerLogo">bakat.id</div>
    <div class="q-counter" id="qCounter">1 / 11</div>
  </div>

  <!-- SUBTEST BADGE -->
  <div class="subtest-badge">
    <div class="badge-pill" id="subtestBadge">💌 Receiving</div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- QUESTION -->
  <div class="question-wrap">
    <div class="q-eyebrow" id="qEyebrow">Pilih dari yang paling menggambarkan kamu</div>
    <div class="q-text" id="qText"></div>
  </div>

  <!-- RANK LIST -->
  <div class="cards-stage" id="cardsStage"></div>

  <!-- BOTTOM -->
  <div class="bottom">
    <div class="hint-text" id="hintText">Tap sesuai urutan — yang paling ngena duluan</div>
    <button class="next-btn" id="nextBtn" onclick="doNext()">
      <span class="next-label" id="nextLabel">Lanjut</span>
      <div class="next-icon">→</div>
    </button>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="data/love_language_data.js"></script>
<script>
// ── PAGE TRANSITIONS ─────────────────────────────────────────
function _rippleEl(x, y, filled) {
  const el = document.createElement('div');
  const r = Math.hypot(Math.max(x, innerWidth - x), Math.max(y, innerHeight - y)) + 40;
  el.style.cssText = `position:fixed;left:${x}px;top:${y}px;width:${r*2}px;height:${r*2}px;` +
    `margin-left:${-r}px;margin-top:${-r}px;border-radius:50%;background:#F7D6DC;` +
    `z-index:9999;pointer-events:none;transform:scale(${filled?1:0});transition:none;`;
  document.body.appendChild(el);
  return el;
}
function rippleTo(evtOrNull, url) {
  const x = evtOrNull?.clientX ?? innerWidth / 2;
  const y = evtOrNull?.clientY ?? innerHeight / 2;
  sessionStorage.setItem('_rp', x / innerWidth + ',' + y / innerHeight);
  const el = _rippleEl(x, y, false);
  requestAnimationFrame(() => requestAnimationFrame(() => {
    el.style.transition = 'transform 0.5s cubic-bezier(0.4,0,1,1)';
    el.style.transform = 'scale(1)';
  }));
  setTimeout(() => { location.href = url; }, 520);
}
(function() {
  const rp = sessionStorage.getItem('_rp');
  sessionStorage.removeItem('_rp');
  const parts = rp ? rp.split(',').map(Number) : [0.5, 0.5];
  const x = parts[0] * innerWidth, y = parts[1] * innerHeight;
  const el = _rippleEl(x, y, true);
  requestAnimationFrame(() => requestAnimationFrame(() => {
    el.style.transition = 'transform 0.5s cubic-bezier(0,0,0.2,1)';
    el.style.transform = 'scale(0)';
    setTimeout(() => el.remove(), 550);
  }));
})();

// ── URL PARAMS ───────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const mode   = params.get('mode') || localStorage.getItem('llStartMode') || 'receiving';

const CODE_EMOJI = { A: '💬', B: '⏰', C: '🎁', D: '🤝', E: '🤗' };

// ── STATE ────────────────────────────────────────────────────
let questions   = LL.questions[mode];
let currentQ    = 0;
let rankOrder  = [];   // Q11: rankOrder[cardIdx] = rank (1-based) or null
let cardStates = [];   // Q1-10: 'idle' | 'best' | 'worst' | 'neutral'
let answers    = [];   // [{questionNo, rankOrder: [code1, code2, ...]}]

const BG_GRADIENTS = [
  'radial-gradient(ellipse at 30% 20%, rgba(200,64,90,0.09) 0%, transparent 60%), radial-gradient(ellipse at 80% 80%, rgba(196,168,212,0.06) 0%, transparent 50%)',
  'radial-gradient(ellipse at 70% 15%, rgba(125,26,46,0.08) 0%, transparent 55%), radial-gradient(ellipse at 20% 85%, rgba(200,64,90,0.06) 0%, transparent 50%)',
  'radial-gradient(ellipse at 50% 30%, rgba(196,168,212,0.10) 0%, transparent 60%), radial-gradient(ellipse at 80% 70%, rgba(125,26,46,0.05) 0%, transparent 50%)',
  'radial-gradient(ellipse at 20% 25%, rgba(200,64,90,0.08) 0%, transparent 55%), radial-gradient(ellipse at 75% 75%, rgba(232,213,240,0.08) 0%, transparent 50%)',
  'radial-gradient(ellipse at 60% 10%, rgba(125,26,46,0.07) 0%, transparent 50%), radial-gradient(ellipse at 30% 80%, rgba(196,168,212,0.07) 0%, transparent 55%)',
  'radial-gradient(ellipse at 40% 30%, rgba(200,64,90,0.09) 0%, transparent 60%), radial-gradient(ellipse at 70% 70%, rgba(125,26,46,0.06) 0%, transparent 50%)',
  'radial-gradient(ellipse at 80% 20%, rgba(196,168,212,0.08) 0%, transparent 55%), radial-gradient(ellipse at 25% 75%, rgba(200,64,90,0.07) 0%, transparent 50%)',
  'radial-gradient(ellipse at 50% 50%, rgba(200,64,90,0.07) 0%, transparent 65%), radial-gradient(ellipse at 85% 15%, rgba(232,213,240,0.06) 0%, transparent 50%)',
  'radial-gradient(ellipse at 15% 40%, rgba(125,26,46,0.08) 0%, transparent 55%), radial-gradient(ellipse at 80% 65%, rgba(196,168,212,0.07) 0%, transparent 50%)',
  'radial-gradient(ellipse at 65% 25%, rgba(200,64,90,0.09) 0%, transparent 60%), radial-gradient(ellipse at 30% 80%, rgba(125,26,46,0.06) 0%, transparent 50%)',
  'radial-gradient(ellipse at 45% 15%, rgba(196,168,212,0.10) 0%, transparent 55%), radial-gradient(ellipse at 70% 80%, rgba(200,64,90,0.08) 0%, transparent 55%)',
];

// ── INIT ─────────────────────────────────────────────────────
function init() {
  document.getElementById('subtestBadge').textContent =
    mode === 'receiving' ? '💌 Receiving' : '🎁 Giving';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const isQ11 = q.options.length === 5;

  document.getElementById('backBtn').style.display = currentQ > 0 ? 'flex' : 'none';
  document.getElementById('qCounter').textContent = `${currentQ + 1} / ${questions.length}`;
  document.getElementById('progressFill').style.width = `${(currentQ / questions.length) * 100}%`;
  document.getElementById('bgScene').style.background = BG_GRADIENTS[currentQ % BG_GRADIENTS.length];

  document.getElementById('qEyebrow').textContent = isQ11
    ? 'Urut semua dari yang paling ngena'
    : 'Pilih yang paling gue banget & yang paling bukan gue banget';
  document.getElementById('qText').textContent = q.skenario;

  const stage = document.getElementById('cardsStage');
  stage.innerHTML = '';

  if (isQ11) {
    rankOrder = new Array(q.options.length).fill(null);
    q.options.forEach((opt, i) => {
      const row = document.createElement('div');
      row.className = 'rank-row';
      row.dataset.idx = i;
      row.innerHTML = `
        <div class="rank-row-badge" id="badge-${i}"></div>
        <div class="rank-row-label">${opt.text}</div>
      `;
      row.addEventListener('click', () => tapRank(i));
      stage.appendChild(row);
    });
  } else {
    cardStates = new Array(q.options.length).fill('idle');
    q.options.forEach((opt, i) => {
      const emoji = CODE_EMOJI[opt.code] || '✦';
      const card = document.createElement('div');
      card.className = 'choice-card';
      card.dataset.idx = i;
      card.innerHTML = `
        <div class="cc-emoji-wrap"><span>${emoji}</span></div>
        <div class="cc-body">
          <div class="cc-text">${opt.text}</div>
          <div class="cc-pill" id="cpill-${i}"></div>
        </div>
        <div class="cc-check" id="cdot-${i}"><span id="cdot-icon-${i}"></span></div>
      `;
      card.addEventListener('click', () => tapCard(i));
      stage.appendChild(card);
    });
  }

  document.getElementById('nextBtn').classList.remove('visible');
  document.getElementById('nextLabel').textContent =
    currentQ === questions.length - 1 ? 'Lihat Hasilku →' : 'Lanjut';
  updateHint();
}

// ── CARD MECHANIC (Q1-10) ────────────────────────────────────
function tapCard(i) {
  const state   = cardStates[i];
  const bestIdx = cardStates.indexOf('best');

  if (state === 'idle') {
    if (bestIdx === -1) {
      cardStates[i] = 'best';
    } else {
      // Second selection → worst, remainder → neutral, show Lanjut
      cardStates[i] = 'worst';
      for (let j = 0; j < cardStates.length; j++) {
        if (cardStates[j] === 'idle') cardStates[j] = 'neutral';
      }
    }
  } else if (state === 'best') {
    cardStates.fill('idle');
  } else {
    // Tap worst or neutral → reset worst+neutral, keep best
    for (let j = 0; j < cardStates.length; j++) {
      if (cardStates[j] === 'worst' || cardStates[j] === 'neutral') cardStates[j] = 'idle';
    }
  }

  refreshCardUI();
}

function refreshCardUI() {
  const q = questions[currentQ];
  for (let i = 0; i < q.options.length; i++) {
    const card = document.querySelector(`.choice-card[data-idx="${i}"]`);
    if (!card) continue;
    card.classList.remove('state-best', 'state-worst', 'state-neutral');
    if (cardStates[i] !== 'idle') card.classList.add(`state-${cardStates[i]}`);

    const icon = document.getElementById(`cdot-icon-${i}`);
    const pill = document.getElementById(`cpill-${i}`);
    if (cardStates[i] === 'best')       { icon.textContent = '✓'; pill.textContent = 'Paling gue banget'; }
    else if (cardStates[i] === 'worst') { icon.textContent = '✕'; pill.textContent = 'Bukan gue banget'; }
    else                                { icon.textContent = ''; pill.textContent = ''; }
  }
  const done = cardStates.includes('worst');
  document.getElementById('nextBtn').classList.toggle('visible', done);
  updateHint();
}

// ── RANK MECHANIC (Q11) ──────────────────────────────────────
function tapRank(i) {
  const existing = rankOrder[i];
  if (existing !== null) {
    for (let j = 0; j < rankOrder.length; j++) {
      if (rankOrder[j] !== null && rankOrder[j] > existing) rankOrder[j]--;
    }
    rankOrder[i] = null;
  } else {
    rankOrder[i] = rankOrder.filter(r => r !== null).length + 1;
  }
  refreshRankUI();
}

function refreshRankUI() {
  const q = questions[currentQ];
  for (let i = 0; i < q.options.length; i++) {
    const row   = document.querySelector(`.rank-row[data-idx="${i}"]`);
    const badge = document.getElementById(`badge-${i}`);
    const rank  = rankOrder[i];
    row.classList.toggle('rank-done', rank !== null);
    badge.textContent = rank !== null ? rank : '';
    if (rank === null) badge.innerHTML = '';
  }
  const done  = rankOrder.filter(r => r !== null).length;
  const total = q.options.length;
  document.getElementById('nextBtn').classList.toggle('visible', done === total);
  updateHint();
}

// ── HINT ─────────────────────────────────────────────────────
function updateHint() {
  const q    = questions[currentQ];
  const isQ11 = q.options.length === 5;
  const hint = document.getElementById('hintText');

  if (isQ11) {
    const done  = rankOrder.filter(r => r !== null).length;
    const total = q.options.length;
    if (done === 0) {
      hint.textContent = 'Tap sesuai urutan — yang paling ngena duluan';
      hint.classList.remove('active');
    } else if (done < total) {
      hint.textContent = `${done} dari ${total} sudah dipilih`;
      hint.classList.add('active');
    } else {
      hint.textContent = 'Kamu sudah urut semua!';
      hint.classList.add('active');
    }
  } else {
    const bestIdx  = cardStates.indexOf('best');
    const worstIdx = cardStates.indexOf('worst');
    if (bestIdx === -1) {
      hint.textContent = 'Tap yang paling gue banget';
      hint.classList.remove('active');
    } else if (worstIdx === -1) {
      hint.textContent = 'Sekarang tap yang paling bukan gue banget';
      hint.classList.add('active');
    } else {
      hint.textContent = 'Bisa diubah lagi sebelum tekan Lanjut';
      hint.classList.add('active');
    }
  }
}

// ── NAVIGATION ───────────────────────────────────────────────
function doNext() {
  const q = questions[currentQ];
  const isQ11 = q.options.length === 5;
  let orderedCodes;

  if (isQ11) {
    orderedCodes = new Array(q.options.length);
    q.options.forEach((opt, i) => { orderedCodes[rankOrder[i] - 1] = opt.code; });
  } else {
    const bestIdx    = cardStates.indexOf('best');
    const neutralIdx = cardStates.indexOf('neutral');
    const worstIdx   = cardStates.indexOf('worst');
    orderedCodes = [
      q.options[bestIdx].code,
      q.options[neutralIdx].code,
      q.options[worstIdx].code,
    ];
  }

  answers.push({ questionNo: q.no, rankOrder: orderedCodes });
  currentQ++;

  if (currentQ >= questions.length) {
    finishSubtest();
  } else {
    const qText = document.getElementById('qText');
    qText.style.opacity = '0';
    setTimeout(() => { renderQuestion(); qText.style.opacity = '1'; }, 200);
  }
}

function doBack() {
  if (currentQ === 0) return;
  answers.pop();
  currentQ--;
  renderQuestion();
}

function finishSubtest() {
  const result = calculateScore(answers, questions);
  const key = `llResult${mode.charAt(0).toUpperCase() + mode.slice(1)}`;
  localStorage.setItem(key, JSON.stringify(result));
  localStorage.setItem(`llAnswers${mode.charAt(0).toUpperCase() + mode.slice(1)}`, JSON.stringify(answers));
  triggerStackingTransition(result, `result.html?type=${mode}`);
}

/* ── STACKING CARDS TRANSITION ───────────────────────────────────────── */
const LL_IMG_MAP = {
  A: 'assets/words-of-affirmation.png',
  B: 'assets/quality-time.png',
  C: 'assets/receiving-gifts.png',
  D: 'assets/act-of-service.png',
  E: 'assets/physical-touch.png',
};
const LL_NAME_MAP = {
  A: 'Words of Affirmation',
  B: 'Quality Time',
  C: 'Receiving Gifts',
  D: 'Acts of Service',
  E: 'Physical Touch',
};

function triggerStackingTransition(result, url) {
  const overlay = document.createElement('div');
  overlay.style.cssText = [
    'position:fixed;inset:0;z-index:4000;',
    'background:#F5EDF2;',
    'opacity:0;transition:opacity 0.35s ease;',
    'overflow:hidden;',
  ].join('');

  const bgEl = document.createElement('div');
  bgEl.style.cssText = [
    'position:absolute;inset:0;',
    'background:radial-gradient(ellipse at 50% 40%,rgba(200,64,90,0.28) 0%,rgba(125,26,46,0.10) 55%,transparent 80%);',
  ].join('');
  overlay.appendChild(bgEl);

  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;';
  overlay.appendChild(canvas);

  const imgSrc = LL_IMG_MAP[result.primary] || 'assets/words-of-affirmation.png';
  const llName = LL_NAME_MAP[result.primary] || '';
  const polaroidWrap = document.createElement('div');
  polaroidWrap.style.cssText = [
    'position:absolute;left:50%;bottom:-380px;',
    'transform:translateX(-50%) rotate(2.5deg);',
    'width:min(220px,calc(100vw - 80px));',
    'z-index:20;opacity:0;transition:none;',
    'will-change:bottom,opacity;',
  ].join('');
  polaroidWrap.innerHTML = `
    <div style="
      background:linear-gradient(180deg,#f7ede0 0%,#ede2d0 100%);
      border-radius:14px;padding:8px 8px 22px;
      box-shadow:rgba(200,64,90,0.18) 0 8px 32px,rgba(0,0,0,0.06) 0 2px 8px;
    ">
      <div style="border-radius:8px;overflow:hidden;height:158px;position:relative;">
        <img src="${imgSrc}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;">
        <div style="position:absolute;bottom:0;left:0;right:0;padding:20px 8px 7px;
          background:linear-gradient(transparent,rgba(0,0,0,0.65));
          font-size:10px;font-weight:600;color:#fff;text-align:center;
          font-family:'DM Sans',sans-serif;letter-spacing:0.04em;">
          ${llName}</div>
      </div>
    </div>`;
  overlay.appendChild(polaroidWrap);
  document.body.appendChild(overlay);

  requestAnimationFrame(() => {
    overlay.style.opacity = '1';
    setTimeout(() => _runStackingAnimation(canvas, overlay, polaroidWrap, url), 120);
  });
}

function _runStackingAnimation(canvas, overlay, polaroidWrap, url) {
  const W   = window.innerWidth;
  const H   = window.innerHeight;
  const DPR = Math.min(window.devicePixelRatio, 2);

  const isMob = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: !isMob, alpha: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(DPR, isMob ? 1.5 : 2));

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(38, W / H, 0.1, 60);
  camera.position.set(0, 0, 9);

  scene.add(new THREE.AmbientLight(0xffffff, 0.55));
  const key = new THREE.DirectionalLight(0xfff5e8, 1.6);
  key.position.set(2, 4, 7);
  scene.add(key);
  const fill = new THREE.DirectionalLight(0xF49CBB, 0.30);
  fill.position.set(-3, -2, 5);
  scene.add(fill);

  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(20, 20),
    new THREE.ShadowMaterial({ opacity: 0.20 })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -4.2;
  scene.add(floor);

  const CW = 2.0, CH = 2.68, CD = 0.05;

  const Q_GRADS = [
    ['#C8405A','#7D1A2E'], ['#7D1A2E','#1C1016'], ['#F2A0B0','#C8405A'],
    ['#C4923A','#8C601A'], ['#1C1016','#0F0810'], ['#C8405A','#C4923A'],
    ['#7D1A2E','#C8405A'], ['#8C6870','#4A2D35'], ['#F2A0B0','#7D1A2E'],
    ['#1C1016','#7D1A2E'], ['#C8405A','#1C1016'],
  ];

  function makeGradTex(top, bot) {
    const c = document.createElement('canvas');
    c.width = 256; c.height = 350;
    const ctx = c.getContext('2d');
    const g = ctx.createLinearGradient(0, 0, 0, 350);
    g.addColorStop(0, top); g.addColorStop(1, bot);
    ctx.fillStyle = g; ctx.fillRect(0, 0, 256, 350);
    const r1 = ctx.createRadialGradient(30, 350, 0, 30, 350, 180);
    r1.addColorStop(0, 'rgba(200,64,90,0.22)'); r1.addColorStop(1, 'rgba(200,64,90,0)');
    ctx.fillStyle = r1; ctx.fillRect(0, 0, 256, 350);
    const r2 = ctx.createRadialGradient(226, 350, 0, 226, 350, 150);
    r2.addColorStop(0, 'rgba(196,146,58,0.18)'); r2.addColorStop(1, 'rgba(196,146,58,0)');
    ctx.fillStyle = r2; ctx.fillRect(0, 0, 256, 350);
    ctx.strokeStyle = 'rgba(200,64,90,0.20)';
    ctx.lineWidth = 7; ctx.strokeRect(3.5, 3.5, 249, 343);
    return new THREE.CanvasTexture(c);
  }

  function makeBackTex() {
    const c = document.createElement('canvas');
    c.width = 256; c.height = 350;
    const ctx = c.getContext('2d');
    const g = ctx.createLinearGradient(0, 0, 0, 350);
    g.addColorStop(0, '#F2A0B0'); g.addColorStop(1, '#7D1A2E');
    ctx.fillStyle = g; ctx.fillRect(0, 0, 256, 350);
    return new THREE.CanvasTexture(c);
  }

  const visH = 2 * Math.tan(19 * Math.PI / 180) * camera.position.z;
  const DECK_Y = -(visH / 2) + CH * 0.78;

  const NUM_CARDS = 11;
  const cardMeshes = [];
  for (let i = 0; i < NUM_CARDS; i++) {
    const [top, bot] = Q_GRADS[i];
    const geo  = new THREE.BoxGeometry(CW, CH, CD);
    const mats = [
      new THREE.MeshLambertMaterial({ color: 0xf5e0e8 }),
      new THREE.MeshLambertMaterial({ color: 0xf5e0e8 }),
      new THREE.MeshLambertMaterial({ color: 0xfbf6f0 }),
      new THREE.MeshLambertMaterial({ color: 0xfbf6f0 }),
      new THREE.MeshPhongMaterial({ map: makeGradTex(top, bot), shininess: 35 }),
      new THREE.MeshPhongMaterial({ map: makeBackTex(), shininess: 18 }),
    ];
    const mesh = new THREE.Mesh(geo, mats);
    mesh.position.set(0, 2.0, -i * 0.06);
    mesh.visible = false;
    scene.add(mesh);
    cardMeshes.push(mesh);
  }

  function eOut3(t)      { return 1 - (1 - t) ** 3; }
  function eIO3(t)       { return t < 0.5 ? 4*t*t*t : 1 - ((-2*t+2)**3)/2; }
  function lerp(a, b, t) { return a + (b - a) * t; }

  const stackTargets = cardMeshes.map((_, i) => ({
    y:  DECK_Y + i * 0.028,
    z:  -i * 0.05,
    rz: (i % 2 === 0 ? 1 : -1) * (0.018 + i * 0.007),
    rx: -0.04,
  }));

  const ENTER_START    = 0.20;
  const ENTER_DUR      = 0.55;
  const STAGGER        = 0.08;
  const COMPRESS_START = ENTER_START + NUM_CARDS * STAGGER + ENTER_DUR - 0.30;
  const COMPRESS_DUR   = 0.65;
  const SHUFFLE_START  = COMPRESS_START + COMPRESS_DUR + 0.05;
  const RESULT_START   = SHUFFLE_START + 0.50;
  const FADEOUT_START  = RESULT_START  + 1.80;

  let elapsed = 0, resultShown = false, navScheduled = false, animStopped = false;
  let lastTime = performance.now();

  function tick(now) {
    if (animStopped) return;
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;
    elapsed += dt;

    cardMeshes.forEach((mesh, i) => {
      const enterAt = ENTER_START + i * STAGGER;
      if (elapsed < enterAt) return;
      mesh.visible = true;
      const tgt = stackTargets[i];
      let targetY = tgt.y, targetRz = tgt.rz, targetZ = tgt.z;

      if (elapsed >= COMPRESS_START) {
        const ct  = Math.min(1, (elapsed - COMPRESS_START) / COMPRESS_DUR);
        const cet = eIO3(ct);
        targetY  = lerp(tgt.y,  DECK_Y + i * 0.016,                  cet);
        targetRz = lerp(tgt.rz, (i % 2 === 0 ? 1 : -1) * i * 0.006, cet);
        targetZ  = lerp(tgt.z,  -i * 0.06,                            cet);
      }

      if (elapsed >= SHUFFLE_START) {
        const st = elapsed - SHUFFLE_START;
        const decay = Math.exp(-st * 2.8);
        mesh.rotation.z  = targetRz + Math.sin(st * 6.2 + i * 1.15) * 0.014 * decay;
        mesh.position.y  = targetY  + Math.sin(st * 5.1 + i * 0.75) * 0.007 * decay;
        mesh.position.z  = targetZ;
        mesh.rotation.x  = tgt.rx;
        return;
      }

      const et = eOut3(Math.min(1, (elapsed - enterAt) / ENTER_DUR));
      mesh.position.y  = lerp(2.0, targetY,  et);
      mesh.position.z  = targetZ;
      mesh.rotation.z  = lerp(0,   targetRz, et);
      mesh.rotation.x  = tgt.rx;
    });

    if (elapsed >= RESULT_START && !resultShown) {
      resultShown = true;
      polaroidWrap.style.transition = 'bottom 1.35s cubic-bezier(0.22,1,0.36,1), opacity 0.55s ease';
      polaroidWrap.style.bottom  = '33%';
      polaroidWrap.style.opacity = '1';
    }

    if (elapsed >= FADEOUT_START && !navScheduled) {
      navScheduled = true;
      overlay.style.transition      = 'opacity 0.65s ease';
      overlay.style.opacity         = '0';
      polaroidWrap.style.transition = 'opacity 0.65s ease';
      polaroidWrap.style.opacity    = '0';
      setTimeout(() => {
        animStopped = true;
        renderer.dispose();
        window.location.href = url;
      }, 680);
    }

    renderer.render(scene, camera);
    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
}

function calculateScore(answers, questions) {
  const scores = { A: 0, B: 0, C: 0, D: 0, E: 0 };
  const q11Pts = { A: 0, B: 0, C: 0, D: 0, E: 0 };

  answers.forEach(({ questionNo, rankOrder: ro }) => {
    if (questionNo !== 11) {
      ro.forEach((code, i) => { scores[code] += (3 - i); });
    } else {
      ro.forEach((code, i) => { q11Pts[code] = 5 - i; });
    }
  });

  const sorted = Object.entries(scores)
    .sort(([ca, sa], [cb, sb]) => sb !== sa ? sb - sa : q11Pts[cb] - q11Pts[ca]);

  return { primary: sorted[0][0], secondary: sorted[1][0], scores, q11Pts };
}

init();
</script>
