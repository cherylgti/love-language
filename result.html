<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hasil Love Language – bakat.id</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --lav: #C8405A;
  --lav-light: #F2A0B0;
  --lav-pale: #FDF0F2;
  --lav-deep: #7D1A2E;
  --cream: #FBF8F4;
  --warm-white: #FEFCFA;
  --blush: #F7D6DC;
  --ink: #1C1016;
  --ink-mid: #4A2D35;
  --ink-muted: #8C6870;
  --gold: #C4923A;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  font-family: 'DM Sans', system-ui, sans-serif;
  color: var(--ink); min-height: 100%;
  background: var(--warm-white);
}

.bg {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(200,64,90,0.07) 0%, transparent 60%);
  pointer-events: none;
}

.app {
  position: relative; z-index: 1;
  max-width: 430px; margin: 0 auto;
  min-height: 100dvh;
  display: flex; flex-direction: column;
  padding-bottom: calc(32px + env(safe-area-inset-bottom));
}

/* ── HEADER ──────────────────────────────── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 20px 6px;
}
.logo { font-size: 15px; font-weight: 700; letter-spacing: 0.02em; color: var(--ink); }
.header-share-btn {
  background: var(--lav);
  border: none; border-radius: 100px; padding: 7px 14px;
  color: #fff; font-family: 'DM Sans', system-ui, sans-serif;
  font-size: 12px; font-weight: 500; cursor: pointer;
  box-shadow: 0 4px 16px rgba(200,64,90,0.28);
  transition: background 0.18s, transform 0.15s;
}
.header-share-btn:hover { background: var(--lav-deep); transform: translateY(-1px); }
.header-share-btn:active { transform: scale(0.97); }

/* ── TOP SECTION ──────────────────────────── */
.top-section { text-align: center; padding: 6px 20px 0; }
.top-eyebrow {
  font-size: 11px; font-weight: 500;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--lav); margin-bottom: 4px;
}
.top-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: clamp(28px, 8vw, 36px); font-weight: 700;
  letter-spacing: -0.01em; line-height: 1.1; color: var(--ink);
}

/* ── POLAROID SECTION ─────────────────────── */
.card-section {
  display: flex; justify-content: center;
  padding: 0 20px; margin-top: 32px;
}
.card-wrap-primary {
  position: relative; width: 55%;
  display: flex; flex-direction: column; align-items: center;
}
.polaroid {
  background: linear-gradient(180deg, #f7ede0 0%, #ede2d0 100%);
  border-radius: 14px; padding: 8px 8px 20px; width: 100%;
  box-shadow:
    rgba(200,64,90,0.18) 0 8px 32px,
    rgba(255,252,250,0.55) 2px 2px 0 inset,
    rgba(200,64,90,0.10) 0 20px 50px,
    rgba(0,0,0,0.05) 0 4px 12px;
  transform: rotate(2deg);
  animation: polFloat 5.5s ease-in-out infinite 0.6s;
  position: relative; z-index: 2;
}
@keyframes polFloat {
  0%,100% { transform: rotate(2deg) translateY(0); }
  50%      { transform: rotate(2deg) translateY(-7px); }
}
.pi {
  border-radius: 8px; overflow: hidden;
  height: 148px; position: relative;
  box-shadow: rgba(0,0,0,0.15) 0 0 8px inset;
}
.pi-bg    { position: absolute; inset: 0; z-index: 0; }
.pi-gl    { display: none; }
.pi-gr    { display: none; }
.pi-gc    { display: none; }
.pi-label {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 3;
  padding: 24px 8px 7px;
  background: linear-gradient(transparent, rgba(0,0,0,0.72));
  font-size: 10px; font-weight: 700; color: #fff;
  text-align: center; line-height: 1.3;
  text-shadow: 0 1px 4px rgba(0,0,0,0.7);
}
.polaroid-name {
  text-align: center; margin-top: 9px;
  font-size: 12px; font-weight: 700; color: var(--ink-mid);
  letter-spacing: 0.03em;
}

/* ── VIBES BLOCK ──────────────────────────── */
.vibes-block {
  margin: 18px 22px 0;
  padding: 16px 20px 14px;
  background: rgba(200,64,90,0.05);
  border: 1px solid rgba(200,64,90,0.18);
  border-radius: 14px;
  font-size: 13px; font-weight: 400;
  color: var(--ink-mid); line-height: 1.7;
  position: relative; overflow: hidden;
}
.vibes-block::before {
  content: '✦';
  position: absolute; top: 10px; right: 14px;
  font-size: 22px; color: var(--lav-light); opacity: 0.4;
  pointer-events: none;
}

/* ── TRAITS ───────────────────────────────── */
.traits-section { margin: 18px 22px 0; }
.section-eyebrow {
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.13em; text-transform: uppercase;
  color: var(--lav); margin-bottom: 12px; display: block;
}
.bullet-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 14px; border-radius: 12px;
  background: rgba(200,64,90,0.04);
  border: 1px solid rgba(200,64,90,0.10);
  margin-bottom: 7px;
}
.bullet-dot {
  width: 6px; min-width: 6px; height: 6px; border-radius: 50%;
  background: var(--lav); flex-shrink: 0; margin-top: 6px;
}
.bullet-text { font-size: 13px; color: var(--ink-mid); line-height: 1.55; }

/* ── DIVIDER ──────────────────────────────── */
.divider {
  height: 1px; margin: 18px 22px 0;
  background: linear-gradient(90deg, transparent, rgba(200,64,90,0.18), transparent);
}

/* ── SHARE SECTION ───────────────────────── */
.share-section {
  padding: 14px 22px 0;
  display: flex; flex-direction: column; align-items: center; gap: 9px;
}
.share-label {
  font-size: 10.5px; font-weight: 500;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--ink-muted);
}
.share-icons {
  display: flex; gap: 9px; align-items: center; flex-wrap: wrap; justify-content: center;
}
.share-icon-btn {
  width: 44px; height: 44px; border-radius: 50%;
  border: 1px solid rgba(200,64,90,0.18);
  background: rgba(200,64,90,0.05);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer;
  transition: background 0.18s, transform 0.16s;
}
.share-icon-btn:active { transform: scale(0.91); background: rgba(200,64,90,0.12); }
.share-icon-btn.wa      { background: #E6F9EE;  border-color: #25D366; color: #128C4E; }
.share-icon-btn.x       { background: #E8E4E6;  border-color: rgba(0,0,0,0.55); color: #1C1016; }
.share-icon-btn.ig      { background: #FDEEF1;  border-color: #C8405A; color: #7D1A2E; }
.share-icon-btn.copy    { background: #FDEEF1;  border-color: #C8405A; color: #7D1A2E; }
.share-icon-btn.more    { background: #FDF4E7;  border-color: #C4923A; color: #7A5520; }

/* ── CTA SECTION ──────────────────────────── */
.cta-section {
  padding: 18px 22px 0;
  display: flex; flex-direction: column; gap: 9px;
}
.cta-primary {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; border: none; border-radius: 100px; padding: 14px 24px;
  background: var(--lav); box-shadow: 0 4px 20px rgba(200,64,90,0.30);
  cursor: pointer; font-family: 'DM Sans', system-ui, sans-serif;
  font-weight: 500; font-size: 14px; color: #fff;
  transition: transform 0.18s, background 0.18s;
}
.cta-primary:hover { background: var(--lav-deep); transform: translateY(-2px); }
.cta-primary:active { transform: scale(0.97); }
.cta-secondary {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; border: 1px solid rgba(200,64,90,0.25); border-radius: 100px;
  padding: 13px 24px; background: transparent;
  cursor: pointer; font-family: 'DM Sans', system-ui, sans-serif;
  font-weight: 400; font-size: 13px; color: var(--ink-mid);
  transition: border-color 0.18s, color 0.18s;
}
.cta-secondary:hover { border-color: var(--lav); color: var(--lav); }
.cta-secondary:active { transform: scale(0.97); }
.cta-ghost {
  background: none; border: none; cursor: pointer;
  font-family: 'DM Sans', system-ui, sans-serif;
  font-size: 12.5px; color: var(--ink-muted); text-align: center;
  transition: color 0.18s;
}

/* ── SUITE NUDGE ──────────────────────────── */
.suite-nudge {
  padding: 20px 20px 0;
  border-top: 1px solid rgba(200,64,90,0.12);
  margin-top: 20px;
}
.suite-nudge-text {
  font-size: 12.5px; color: var(--ink-muted);
  line-height: 1.75; text-align: center; margin-bottom: 14px;
}
.suite-nudge-text em { font-style: normal; color: var(--lav); font-weight: 500; }
.suite-nudge-list { display: flex; flex-direction: column; gap: 8px; }
.suite-nudge-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; border-radius: 12px;
  background: rgba(200,64,90,0.05);
  border: 1px solid rgba(200,64,90,0.14);
  cursor: pointer; text-align: left;
  font-family: 'DM Sans', system-ui, sans-serif;
  width: 100%; transition: background 0.18s;
}
.suite-nudge-item:hover { background: rgba(200,64,90,0.10); }
.suite-nudge-item.soon { opacity: 0.52; cursor: default; pointer-events: none; }
.suite-nudge-cs {
  font-size: 9.5px; font-weight: 600; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--ink-muted);
  background: rgba(140,104,112,0.09);
  border: 1px solid rgba(140,104,112,0.16);
  border-radius: 100px; padding: 2px 8px;
  flex-shrink: 0; white-space: nowrap;
}
.suite-nudge-item-info { flex: 1; min-width: 0; }
.suite-nudge-item-name {
  font-size: 12.5px; font-weight: 600;
  color: var(--lav); margin-bottom: 2px;
}
.suite-nudge-item-desc { font-size: 11px; color: var(--ink-muted); line-height: 1.4; }
.suite-nudge-item-icon { font-size: 20px; flex-shrink: 0; }
.suite-nudge-item-arrow { font-size: 14px; color: var(--lav); flex-shrink: 0; }
.cta-ghost:hover { color: var(--lav); }

/* ── SPARKLES ──────────────────────────────── */
.sp {
  position: fixed; background: var(--lav-light); border-radius: 50%;
  pointer-events: none;
  animation: spTwinkle var(--d,2s) ease-in-out infinite var(--dl,0s);
}
@keyframes spTwinkle {
  0%,100% { opacity: 0.06; transform: scale(0.3); }
  50%      { opacity: 0.50; transform: scale(1); }
}

/* ── TOAST ───────────────────────────────── */
.toast {
  position: fixed; bottom: calc(28px + env(safe-area-inset-bottom)); left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: #fff; border-radius: 100px;
  padding: 9px 18px; font-size: 13px; font-weight: 500;
  white-space: nowrap; pointer-events: none; z-index: 9998;
  opacity: 0; transition: opacity 0.2s, transform 0.2s;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>

<script>
// ── PAGE TRANSITIONS ──────────────────────────────────────────
function _rippleEl(x, y, filled) {
  const el = document.createElement('div');
  const r = Math.hypot(Math.max(x, innerWidth - x), Math.max(y, innerHeight - y)) + 40;
  el.style.cssText = `position:fixed;left:${x}px;top:${y}px;width:${r*2}px;height:${r*2}px;` +
    `margin-left:${-r}px;margin-top:${-r}px;border-radius:50%;background:#F7D6DC;` +
    `z-index:9999;pointer-events:none;transform:scale(${filled?1:0});transition:none;`;
  document.body.appendChild(el);
  return el;
}
function rippleTo(evtOrNull, url) {
  const x = evtOrNull?.clientX ?? innerWidth / 2;
  const y = evtOrNull?.clientY ?? innerHeight / 2;
  sessionStorage.setItem('_rp', x / innerWidth + ',' + y / innerHeight);
  const el = _rippleEl(x, y, false);
  requestAnimationFrame(() => requestAnimationFrame(() => {
    el.style.transition = 'transform 0.5s cubic-bezier(0.4,0,1,1)';
    el.style.transform = 'scale(1)';
  }));
  setTimeout(() => { location.href = url; }, 520);
}
(function() {
  const rp = sessionStorage.getItem('_rp');
  sessionStorage.removeItem('_rp');
  const parts = rp ? rp.split(',').map(Number) : [0.5, 0.5];
  const x = parts[0] * innerWidth, y = parts[1] * innerHeight;
  const el = _rippleEl(x, y, true);
  requestAnimationFrame(() => requestAnimationFrame(() => {
    el.style.transition = 'transform 0.5s cubic-bezier(0,0,0.2,1)';
    el.style.transform = 'scale(0)';
    setTimeout(() => el.remove(), 550);
  }));
})();

const type   = new URLSearchParams(location.search).get('type') || 'receiving';
const KEY    = `llResult${type.charAt(0).toUpperCase() + type.slice(1)}`;
const result = JSON.parse(localStorage.getItem(KEY) || 'null');

if (!result) {
  window.location.href = 'index.html';
} else {
  buildPage();
}

function buildPage() {
  const lib        = LL.library[type];
  const primary    = lib[result.primary];
  const otherType  = type === 'receiving' ? 'giving' : 'receiving';
  const hasOther   = !!localStorage.getItem(`llResult${otherType.charAt(0).toUpperCase() + otherType.slice(1)}`);
  const isReceiving = type === 'receiving';

  // Header
  document.getElementById('topTitle').textContent = primary.label;

  // Polaroid
  document.getElementById('primaryBg').style.background = primary.bg;
  document.getElementById('primaryLabel').textContent = primary.label;
  document.getElementById('primaryName').textContent =
    (isReceiving ? '💌 Receiving' : '🎁 Giving') + ' · Primary';

  // Deskripsi singkat
  document.getElementById('vibesBlock').textContent = primary.deskripsiSingkat;

  // Traits bullets
  const traitKey = isReceiving ? 'yangBikinLuluh' : 'caraMenunjukkan';
  document.getElementById('traitEyebrow').textContent =
    isReceiving ? 'Yang bikin kamu merasa dicintai' : 'Cara kamu menunjukkan rasa sayang';
  const items = primary[traitKey] || [];
  document.getElementById('bulletList').innerHTML = items.map(t => `
    <div class="bullet-row">
      <div class="bullet-dot"></div>
      <div class="bullet-text">${t}</div>
    </div>
  `).join('');

  // CTA
  const cta = document.getElementById('ctaSection');
  if (hasOther) {
    cta.innerHTML = `
      <button class="cta-primary" onclick="rippleTo(event,'result-combined.html')">
        ✨ Lihat Profil Kombinasimu
      </button>
      <button class="cta-secondary" onclick="rippleTo(event,'report.html?type=${type}')">
        Lihat Laporan Lengkap
      </button>
      <button class="cta-ghost" onclick="window.location.href='index.html'">← Kembali ke Beranda</button>
    `;
  } else {
    const reportViewed = !!localStorage.getItem(`llReportViewed_${type}`);
    const otherLabel = otherType === 'giving' ? '🎁 Coba Giving juga?' : '💌 Coba Receiving juga?';
    const otherSub   = otherType === 'giving'
      ? 'Lihat cara kamu secara natural menunjukkan rasa sayang.'
      : 'Lihat cara kamu paling nyaman menerima cinta.';
    const otherBtn = reportViewed
      ? `<button class="cta-secondary" onclick="rippleTo(event,'test.html?mode=${otherType}')">${otherLabel}</button>`
      : `<button class="cta-secondary" style="opacity:0.45;cursor:default;border-style:dashed;" disabled>🔒 ${otherLabel}</button>
         <div style="font-size:11px;color:var(--lav);text-align:center;margin-top:-4px;">Buka laporan dulu untuk unlock ✦</div>`;
    cta.innerHTML = `
      <button class="cta-primary" onclick="rippleTo(event,'report.html?type=${type}')">
        Lihat Laporan Lengkap
      </button>
      <div style="margin:4px 0 2px">
        <div style="font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);text-align:center;margin-bottom:8px;">Lanjutkan Eksplorasimu</div>
        ${otherBtn}
      </div>
      <button class="cta-ghost" onclick="window.location.href='index.html'">← Kembali ke Beranda</button>
    `;
  }

  // Sparkles
  [
    { s:4, t:'12%', l:'8%',  d:'2.1s', dl:'0s'   },
    { s:3, t:'20%', l:'88%', d:'1.8s', dl:'0.5s' },
    { s:5, t:'65%', l:'5%',  d:'2.8s', dl:'0.9s' },
    { s:3, t:'75%', l:'92%', d:'2.2s', dl:'0.4s' },
  ].forEach(({ s, t, l, d, dl }) => {
    const sp = document.createElement('div');
    sp.className = 'sp';
    sp.style.cssText = `width:${s}px;height:${s}px;top:${t};left:${l};--d:${d};--dl:${dl};`;
    document.body.appendChild(sp);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function shareToSocial(platform) {
  if (!result) return;
  const primary  = LL.library[type][result.primary];
  const shareText = `Love Language ${type === 'receiving' ? 'Receiving' : 'Giving'}-ku: ${primary.label} ${primary.emoji}\n${primary.tagline}\n\nCari tahu love language kamu di bakat.id`;
  const shareUrl  = window.location.href;

  if (platform === 'copy') {
    navigator.clipboard.writeText(shareUrl).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = shareUrl; document.body.appendChild(ta);
      ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    });
    showToast('🔗 Link tersalin!');
    return;
  }
  if (platform === 'wa') {
    window.open('https://wa.me/?text=' + encodeURIComponent(shareText + '\n' + shareUrl), '_blank');
    return;
  }
  if (platform === 'x') {
    window.open('https://x.com/intent/tweet?text=' + encodeURIComponent(shareText) + '&url=' + encodeURIComponent(shareUrl), '_blank');
    return;
  }
  if (platform === 'instagram') {
    navigator.clipboard?.writeText(shareText + '\n' + shareUrl);
    showToast('📋 Teks tersalin, paste di Instagram!');
    return;
  }
  // native / more
  if (navigator.share) {
    navigator.share({ title: `Love Language: ${primary.label}`, text: shareText, url: shareUrl }).catch(() => {});
  } else {
    navigator.clipboard?.writeText(shareText + '\n' + shareUrl);
    showToast('🔗 Link tersalin!');
  }
}
</script>
